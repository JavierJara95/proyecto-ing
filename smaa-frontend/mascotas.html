<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>SMAA - Mascotas</title>
  </head>
  <body>
    <header class="topbar">
      <a href="index.html"><img src="ref\logo.png" alt="Logo header" /></a>
      <div class="brand">SMAA</div>
      <nav>
        <a href="index.html">Inicio</a><a href="login.html">Login</a
        ><a href="dashboard-viajero.html">Viajero</a
        ><a href="panel-funcionario.html">Funcionario</a
        ><a href="reportes.html">Reportes</a>
      </nav>
    </header>
    <main class="container">
      <div class="page-title-row">
        <h1>Registro de mascota</h1>
        <a class="btn secondary dashboard-return-btn" href="dashboard-viajero.html">Volver al dashboard viajero</a>
      </div>
      <form class="form" onsubmit="crearMascota(event)">
        <label
          >Folio de declaración<input
            id="folioDeclaracion"
            required
            placeholder="Ej: SMAA-20260610123000-1234" /></label
        ><label
          >Tipo animal<input id="tipoAnimal" required value="Perro" /></label
        ><label>Nombre<input id="nombre" required value="Firulais" /></label
        ><label
          >Certificado sanitario<select id="certificadoSanitario">
            <option value="true">Sí</option>
            <option value="false">No</option>
          </select></label
        ><label
          >Vacuna vigente<select id="vacunaVigente">
            <option value="true">Sí</option>
            <option value="false">No</option>
          </select></label
        ><label>Observación<textarea id="observacion"></textarea></label
        ><button class="btn">Registrar mascota</button>
      </form>
    </main>
    <div id="successModal" class="modal" onclick="if(event.target===this) hideSuccessModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Mascota registrada exitosamente</h3>
          <button class="modal-close" type="button" onclick="hideSuccessModal()">×</button>
        </div>
        <div class="modal-body">
          <p id="successModalMessage"></p>
          <button class="btn" onclick="hideSuccessModal()" style="width: 100%; margin-top: 15px;">Aceptar</button>
        </div>
      </div>
    </div>


    <div id="errorModal" class="modal" onclick="if(event.target===this) hideErrorModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Error</h3>
          <button class="modal-close" type="button" onclick="hideErrorModal()">×</button>
        </div>
        <div class="modal-body">
          <p id="errorModalMessage"></p>
        </div>
      </div>
    </div>
    <script src="js/app.js?v=20260611-dashboard-folio"></script>
  </body>
</html>
