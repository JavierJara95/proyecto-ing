<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>SMAA - Mascotas</title>
  </head>
  <body>
    <header class="topbar">
      <a href="index.html"><img src="ref\logo.png" alt="Logo header" /></a>
      <div class="brand">SMAA</div>
      <nav>
        <a href="index.html">Inicio</a><a href="login.html">Login</a
        ><a href="dashboard-viajero.html">Viajero</a
        ><a href="panel-funcionario.html">Funcionario</a
        ><a href="reportes.html">Reportes</a>
      </nav>
    </header>
    <main class="container">
      <h1>Registro de mascota</h1>
      <form class="form" onsubmit="crearMascota(event)">
        <label
          >ID declaración<input
            id="declaracionId"
            type="number"
            required
            value="1" /></label
        ><label
          >Tipo animal<input id="tipoAnimal" required value="Perro" /></label
        ><label>Nombre<input id="nombre" required value="Firulais" /></label
        ><label
          >Certificado sanitario<select id="certificadoSanitario">
            <option value="true">Sí</option>
            <option value="false">No</option>
          </select></label
        ><label
          >Vacuna vigente<select id="vacunaVigente">
            <option value="true">Sí</option>
            <option value="false">No</option>
          </select></label
        ><label>Observación<textarea id="observacion"></textarea></label
        ><button class="btn">Registrar mascota</button>
      </form>
      <pre id="resultado"></pre>
    </main>
    <script src="js/app.js"></script>
  </body>
</html>
