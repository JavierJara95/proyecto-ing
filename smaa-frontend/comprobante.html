<!doctype html>
<html lang="es">

<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/styles.css?v=20260612-mobile-final" />
  <title>SMAA - Comprobante</title>
</head>

<body class="traveler-page" data-required-role="VIAJERO">
    <header class="traveler-topbar">
      <a class="traveler-logo" href="index.html">
        <img src="ref/logo.png" alt="Servicio Nacional de Aduanas" />
      </a>
      <nav class="role-nav" data-menu="viajero"></nav>
    </header>
  <main class="traveler-container">
    <div class="page-title-row">
        <h1>Comprobante QR simulado</h1>
        <a class="btn secondary dashboard-return-btn" href="dashboard-viajero.html">Volver al dashboard viajero</a>
      </div>
    <form class="form" onsubmit="verComprobante(event)">
      <label>Folio<input id="folio" required value="SMAA-2026-0001" /></label><button class="btn">Buscar comprobante</button>
    </form>
  </main>
  <div id="searchResultModal" class="modal" onclick="if(event.target===this) hideSearchResultModal()">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Comprobante</h3>
        <button class="modal-close" type="button" onclick="hideSearchResultModal()">×</button>
      </div>
      <div class="modal-body">
        <div id="qr-comprobante" style="margin-bottom: 15px; display: flex; justify-content: center;"></div>
        <table class="tabla-popup" id="searchResultTable">
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
  <div id="errorModal" class="modal" onclick="if(event.target===this) hideErrorModal()">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Error</h3>
        <button class="modal-close" type="button" onclick="hideErrorModal()">×</button>
      </div>
      <div class="modal-body">
        <p id="errorModalMessage"></p>
      </div>
    </div>
  </div>
  <script src="js/app.js?v=20260612-mobile-final"></script>
</body>

</html>
