<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>SMAA - Comprobante</title>
</head>

<body>
  <header class="topbar">
    <a href="index.html"><img src="ref\logo.png" alt="Logo header" /></a>
    <div class="brand">SMAA</div>
    <nav>
      <a href="index.html">Inicio</a><a href="login.html">Login</a><a href="dashboard-viajero.html">Viajero</a><a
        href="panel-funcionario.html">Funcionario</a><a href="reportes.html">Reportes</a>
    </nav>
  </header>
  <main class="container">
    <div class="page-title-row">
        <h1>Comprobante QR simulado</h1>
        <a class="btn secondary dashboard-return-btn" href="dashboard-viajero.html">Volver al dashboard viajero</a>
      </div>
    <form class="form" onsubmit="verComprobante(event)">
      <label>Folio<input id="folio" required value="SMAA-2026-0001" /></label><button class="btn">Buscar comprobante</button>
    </form>
  </main>
  <div id="searchResultModal" class="modal" onclick="if(event.target===this) hideSearchResultModal()">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Comprobante</h3>
        <button class="modal-close" type="button" onclick="hideSearchResultModal()">×</button>
      </div>
      <div class="modal-body">
        <table class="tabla-popup" id="searchResultTable">
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
  <div id="errorModal" class="modal" onclick="if(event.target===this) hideErrorModal()">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Error</h3>
        <button class="modal-close" type="button" onclick="hideErrorModal()">×</button>
      </div>
      <div class="modal-body">
        <p id="errorModalMessage"></p>
      </div>
    </div>
  </div>
  <script src="js/app.js?v=20260610-folio-copy-dashboard"></script>
</body>

</html>
