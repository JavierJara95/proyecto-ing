<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css?v=20260612-mobile-final" />
    <title>SMAA - SAG</title>
  </head>
  <body class="traveler-page" data-required-role="VIAJERO">
    <header class="traveler-topbar">
      <a class="traveler-logo" href="index.html">
        <img src="ref/logo.png" alt="Servicio Nacional de Aduanas" />
      </a>
      <nav class="role-nav" data-menu="viajero"></nav>
    </header>
    <main class="traveler-container">
      <div class="page-title-row">
        <h1>Declaración SAG</h1>
        <a class="btn secondary dashboard-return-btn" href="dashboard-viajero.html">Volver al dashboard viajero</a>
      </div>
      <form class="form" onsubmit="crearSag(event)">
        <label
          >Folio de declaración<input
            id="folioDeclaracion"
            required
            placeholder="Ej: SMAA-20260610123000-1234" /></label
        ><label
          >Declara productos<select id="declaraProductos">
            <option value="false">No</option>
            <option value="true">Sí</option>
          </select></label
        ><label>Tipo producto<input id="tipoProducto" value="Frutas" /></label
        ><label
          >Producto restringido<select id="productoRestringido">
            <option value="false">No</option>
            <option value="true">Sí</option>
          </select></label
        ><label>Observación<textarea id="observacion"></textarea></label
        ><button class="btn">Registrar SAG</button>
      </form>
    </main>
    <div id="successModal" class="modal" onclick="if(event.target===this) hideSuccessModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Declaración SAG registrada exitosamente</h3>
          <button class="modal-close" type="button" onclick="hideSuccessModal()">×</button>
        </div>
        <div class="modal-body">
          <p id="successModalMessage"></p>
          <button class="btn" onclick="hideSuccessModal()" style="width: 100%; margin-top: 15px;">Aceptar</button>
        </div>
      </div>
    </div>


    <div id="errorModal" class="modal" onclick="if(event.target===this) hideErrorModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Error</h3>
          <button class="modal-close" type="button" onclick="hideErrorModal()">×</button>
        </div>
        <div class="modal-body">
          <p id="errorModalMessage"></p>
        </div>
      </div>
    </div>
    <script src="js/app.js?v=20260612-mobile-final"></script>
  </body>
</html>
