<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>SMAA - Menores</title>
  </head>
  <body>
    <header class="topbar">
      <a href="index.html"><img src="ref\logo.png" alt="Logo header" /></a>
      <div class="brand">SMAA</div>
      <nav>
        <a href="index.html">Inicio</a><a href="login.html">Login</a
        ><a href="dashboard-viajero.html">Viajero</a
        ><a href="panel-funcionario.html">Funcionario</a
        ><a href="reportes.html">Reportes</a>
      </nav>
    </header>
    <main class="container">
      <h1>Registro de menor de edad</h1>
      <form class="form" onsubmit="crearMenor(event)">
        <label
          >ID declaración<input
            id="declaracionId"
            type="number"
            required
            value="1" /></label
        ><label
          >Nombre<input id="nombre" required value="Menor Ejemplo" /></label
        ><label
          >Documento<input id="documento" required value="22333444-5" /></label
        ><label
          >Viaja con ambos padres<select id="viajaConAmbosPadres">
            <option value="true">Sí</option>
            <option value="false">No</option>
          </select></label
        ><label
          >Tiene autorización notarial<select id="tieneAutorizacionNotarial">
            <option value="true">Sí</option>
            <option value="false">No</option>
          </select></label
        ><button class="btn">Registrar menor</button>
      </form>
    </main>
    <div id="successModal" class="modal" onclick="if(event.target===this) hideSuccessModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Menor registrado exitosamente</h3>
          <button class="modal-close" type="button" onclick="hideSuccessModal()">×</button>
        </div>
        <div class="modal-body">
          <p id="successModalMessage"></p>
          <button class="btn" onclick="hideSuccessModal()" style="width: 100%; margin-top: 15px;">Aceptar</button>
        </div>
      </div>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
