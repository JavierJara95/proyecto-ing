<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>SMAA - Reportes</title>
  </head>

  <body>
    <header class="topbar">
      <a href="index.html">
        <img src="ref/logo.png" alt="Logo header" />
      </a>

      <div class="brand">SMAA</div>

      <nav>
        <a href="index.html">Inicio</a>
        <a href="login.html">Login</a>
        <a href="dashboard-viajero.html">Viajero</a>
        <a href="panel-funcionario.html">Funcionario</a>
        <a href="reportes.html">Reportes</a>
      </nav>
    </header>

    <main class="container">
      <h1>Reportes</h1>

      <div style="margin-bottom: 20px">
        <button class="btn" onclick="verReportes()">
          Ver resumen
        </button>

        <button class="btn secondary" onclick="verAuditoria()">
          Ver auditoría
        </button>
      </div>

      <!-- TABLA RESUMEN -->
      <div id="contenedorResumen" style="display:none;">
        <h2>Resumen General</h2>

        <table class="tabla-reportes">
          <thead>
            <tr>
              <th>Indicador</th>
              <th>Valor</th>
            </tr>
          </thead>
          <tbody id="tbodyResumen"></tbody>
        </table>
      </div>

      <!-- TABLA AUDITORIA -->
      <div id="contenedorAuditoria" style="display:none;">
        <h2>Auditoría</h2>

        <table class="tabla-reportes">
          <thead>
            <tr>
              <th>ID</th>
              <th>Usuario</th>
              <th>Acción</th>
              <th>Módulo</th>
              <th>Detalle</th>
              <th>Fecha y hora</th>
            </tr>
          </thead>

          <tbody id="tbodyAuditoria"></tbody>
        </table>
      </div>

      <!-- MENSAJES -->
      <div id="resultado"></div>

    </main>

    <div id="errorModal" class="modal" onclick="if(event.target===this) hideErrorModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Error</h3>
          <button class="modal-close" type="button" onclick="hideErrorModal()">×</button>
        </div>
        <div class="modal-body">
          <p id="errorModalMessage"></p>
        </div>
      </div>
    </div>

    <div id="infoModal" class="modal" onclick="if(event.target===this) hideInfoModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Información</h3>
          <button class="modal-close" type="button" onclick="hideInfoModal()">×</button>
        </div>
        <div class="modal-body">
          <p id="infoModalMessage"></p>
        </div>
      </div>
    </div>

    <script src="js/app.js?v=20260610-folio-wifi"></script>
  </body>
</html>
