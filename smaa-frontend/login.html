<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css?v=20260613-largefilefix" />
    <title>SMAA - Login</title>
  </head>
  <body class="traveler-page">
    <header class="traveler-topbar">
      <a class="traveler-logo" href="index.html">
        <img src="ref/logo.png" alt="Servicio Nacional de Aduanas" />
      </a>
      <nav class="role-nav" data-menu="publico"></nav>
    </header>
    <main class="traveler-container">
      <h1>Inicio de sesión</h1>
      <form class="form" onsubmit="login(event)">
        <label
          >Correo<input
            id="correo"
            type="email"
            required
            autocomplete="username"
            data-clear-on-first-input="true"
            value="correo@smaa.cl" /></label
        ><label
          >Password
          <div class="password-field">
            <input
              id="password"
              type="password"
              required
              autocomplete="current-password"
              data-clear-on-first-input="true"
              value="1234" />
            <button class="password-toggle" type="button" onclick="togglePasswordVisibility('password', this)">Mostrar</button>
          </div>
        </label
        ><button class="btn" type="submit">Ingresar</button>
        <a href="registro.html" class="btn" style="text-align: center; display: block; background: #4b5563; margin-top: 10px;">Registrarse</a>
      </form>
      <pre id="resultado" style="display:none;"></pre>

      <div id="loginPopup" class="popup-overlay" onclick="hideLoginMessage()">
        <div class="popup-box" onclick="event.stopPropagation()">
          <p id="loginPopupText"></p>
          <button type="button" class="popup-close" onclick="hideLoginMessage()">Cerrar</button>
        </div>
      </div>
    </main>
    <script src="js/config.js?v=20260613-largefilefix"></script>
    <script src="js/app.js?v=20260613-largefilefix"></script>
  </body>
</html>
