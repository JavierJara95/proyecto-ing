<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>SMAA - Login</title>
  </head>
  <body>
    <header class="topbar">
      <a href="index.html"><img src="ref\logo.png" alt="Logo header" /></a>
      <div class="brand">SMAA</div>
      <nav>
        <a href="index.html">Inicio</a><a href="login.html">Login</a
        ><a href="dashboard-viajero.html">Viajero</a
        ><a href="panel-funcionario.html">Funcionario</a
        ><a href="reportes.html">Reportes</a>
      </nav>
    </header>
    <main class="container">
      <h1>Inicio de sesión simulado</h1>
      <form class="form" onsubmit="login(event)">
        <label
          >Correo<input
            id="correo"
            type="email"
            required
            value="correo@smaa.cl" /></label
        ><label
          >Password<input
            id="password"
            type="password"
            required
            value="1234" /></label
        ><button class="btn" type="submit">Ingresar</button>
      </form>
      <pre id="resultado"></pre>
    </main>
    <script src="js/app.js"></script>
  </body>
</html>
