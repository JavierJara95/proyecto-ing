<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>SMAA - Login</title>
    <style>
      .popup-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .popup-overlay.active {
        display: flex;
      }
      .popup-box {
        background: #fff;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 16px 40px rgba(0,0,0,0.2);
        max-width: 380px;
        width: calc(100% - 40px);
        text-align: center;
      }
      .popup-box p {
        margin: 0 0 18px;
        color: #b71c1c;
        font-weight: 600;
      }
      .popup-close {
        padding: 10px 18px;
        background: #1976d2;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a href="index.html"><img src="ref\logo.png" alt="Logo header" /></a>
      <div class="brand">SMAA</div>
      <nav>
        <a href="index.html">Inicio</a><a href="login.html">Login</a
        ><a href="dashboard-viajero.html">Viajero</a
        ><a href="panel-funcionario.html">Funcionario</a
        ><a href="reportes.html">Reportes</a>
      </nav>
    </header>
    <main class="container">
      <h1>Inicio de sesión simulado</h1>
      <form class="form" onsubmit="login(event)">
        <label
          >Correo<input
            id="correo"
            type="email"
            required
            value="correo@smaa.cl" /></label
        ><label
          >Password<input
            id="password"
            type="password"
            required
            value="1234" /></label
        ><button class="btn" type="submit">Ingresar</button>
      </form>
      <pre id="resultado" style="display:none;"></pre>

      <div id="loginPopup" class="popup-overlay" onclick="hideLoginMessage()">
        <div class="popup-box" onclick="event.stopPropagation()">
          <p id="loginPopupText"></p>
          <button type="button" class="popup-close" onclick="hideLoginMessage()">Cerrar</button>
        </div>
      </div>
    </main>
    <script src="js/app.js"></script>
  </body>
</html>
