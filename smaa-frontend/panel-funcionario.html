<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>SMAA - Funcionario</title>
  </head>
  <body>
    <header class="topbar">
      <a href="index.html"><img src="ref\logo.png" alt="Logo header" /></a>
      <div class="brand">SMAA</div>
      <nav>
        <a href="index.html">Inicio</a><a href="login.html">Login</a
        ><a href="dashboard-viajero.html">Viajero</a
        ><a href="panel-funcionario.html">Funcionario</a
        ><a href="reportes.html">Reportes</a>
      </nav>
    </header>
    <main class="container">
      <h1>Panel funcionario</h1>
      <div class="card">
        <h3>Buscar expediente</h3>
        <form class="form inline" onsubmit="buscarFolio(event)">
          <input id="folio" placeholder="Folio" value="SMAA-2026-0001" /><button
            class="btn"
          >
            Buscar por folio
          </button>
        </form>
        <form class="form inline" onsubmit="buscarPatente(event)">
          <input id="patente" placeholder="Patente" value="ABCD12" /><button
            class="btn"
          >
            Buscar por patente
          </button>
        </form>
      </div>
      <div class="card">
        <h3>Acciones de fiscalización</h3>
        <form class="form inline" onsubmit="cambiarEstado(event)">
          <input
            id="declaracionId"
            type="number"
            placeholder="ID declaración"
            value="1"
          /><select id="accion">
            <option value="aprobar">Aprobar</option>
            <option value="observar">Observar</option>
            <option value="derivar">Derivar</option></select
          ><button class="btn">Aplicar</button>
        </form>
      </div>
    </main>
    <div id="searchResultModal" class="modal" onclick="if(event.target===this) hideSearchResultModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Resultado de búsqueda</h3>
          <button class="modal-close" type="button" onclick="hideSearchResultModal()">×</button>
        </div>
        <div class="modal-body">
          <table class="tabla-popup" id="searchResultTable">
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
    <div id="errorModal" class="modal" onclick="if(event.target===this) hideErrorModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Error</h3>
          <button class="modal-close" type="button" onclick="hideErrorModal()">×</button>
        </div>
        <div class="modal-body">
          <p id="errorModalMessage"></p>
        </div>
      </div>
    </div>
    <div id="infoModal" class="modal" onclick="if(event.target===this) hideInfoModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Estado actualizado</h3>
          <button class="modal-close" type="button" onclick="hideInfoModal()">×</button>
        </div>
        <div class="modal-body">
          <p id="infoModalMessage"></p>
        </div>
      </div>
    </div>
    <script src="js/app.js?v=20260610-folio-wifi"></script>
  </body>
</html>
