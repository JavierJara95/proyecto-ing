<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css?v=20260612-mobile-final" />
    <title>SMAA - Registro</title>
  </head>
  <body class="traveler-page">
    <header class="traveler-topbar">
      <a class="traveler-logo" href="index.html">
        <img src="ref/logo.png" alt="Servicio Nacional de Aduanas" />
      </a>
      <nav class="role-nav" data-menu="publico"></nav>
    </header>
    <main class="traveler-container">
      <h1>Crear nueva cuenta</h1>
      <form class="form" onsubmit="registrarUsuario(event)">
        <label
          >Correo electrónico<input
            id="correo"
            type="email"
            required
            placeholder="usuario@example.com" /></label
        ><label
          >Contraseña<input
            id="password"
            type="password"
            required
            placeholder="Mínimo 6 caracteres" /></label
        ><label
          >Confirmar contraseña<input
            id="passwordConfirm"
            type="password"
            required
            placeholder="Repetir contraseña" /></label
        ><label
          >Nombre<input
            id="nombre"
            type="text"
            required
            placeholder="Juan" /></label
        ><label
          >Apellido<input
            id="apellido"
            type="text"
            required
            placeholder="Pérez" /></label
        ><label
          >Documento de identidad<input
            id="documento"
            type="text"
            required
            placeholder="12345678-9" /></label
        ><label
          >Rol<select id="rol" required>
            <option value="">-- Seleccionar rol --</option>
            <option value="VIAJERO">Viajero</option>
            <option value="FUNCIONARIO_ADUANAS">Funcionario de Aduanas</option>
          </select></label
        ><button class="btn" type="submit">Registrarse</button>
        <a href="login.html" class="btn" style="text-align: center; display: block; background: #4b5563; margin-top: 10px;">Volver al login</a>
      </form>
    </main>
    <div id="errorModal" class="modal" onclick="if(event.target===this) hideErrorModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Error</h3>
          <button class="modal-close" type="button" onclick="hideErrorModal()">×</button>
        </div>
        <div class="modal-body">
          <p id="errorModalMessage"></p>
        </div>
      </div>
    </div>
    <div id="infoModal" class="modal" onclick="if(event.target===this) hideInfoModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Registro exitoso</h3>
          <button class="modal-close" type="button" onclick="hideInfoModal()">×</button>
        </div>
        <div class="modal-body">
          <p id="infoModalMessage"></p>
          <button class="btn" onclick="irAlLogin()" style="width: 100%; margin-top: 15px;">Ir al login</button>
        </div>
      </div>
    </div>
    <script src="js/app.js?v=20260612-mobile-final"></script>
    <script>
      async function registrarUsuario(e) {
        e.preventDefault();
        
        const correo = document.getElementById('correo').value;
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('passwordConfirm').value;
        const nombre = document.getElementById('nombre').value;
        const apellido = document.getElementById('apellido').value;
        const documento = document.getElementById('documento').value;
        const rol = document.getElementById('rol').value;

        // Validar que las contraseñas coincidan
        if (password !== passwordConfirm) {
          showErrorModal('Las contraseñas no coinciden');
          return;
        }

        // Validar longitud mínima de contraseña
        if (password.length < 6) {
          showErrorModal('La contraseña debe tener mínimo 6 caracteres');
          return;
        }

        try {
          const response = await fetch(`${API}/usuarios`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              correo: correo,
              password: password,
              nombre: nombre,
              apellido: apellido,
              documento: documento,
              rol: rol
            })
          });

          const data = await readResponseBody(response);

          if (!response.ok) {
            throw new Error(getErrorMessage(data, 'Error al registrar usuario'));
          }

          showInfoModal(`¡Bienvenido ${nombre}! Tu cuenta ha sido creada exitosamente. Ahora puedes iniciar sesión.`);
        } catch (error) {
          console.error(error);
          showErrorModal(error.message || 'Error de conexión con el servidor');
        }
      }

      function irAlLogin() {
        window.location.href = 'login.html';
      }
    </script>
  </body>
</html>
