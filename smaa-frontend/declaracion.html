<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <title>SMAA - Declaración</title>
  </head>
  <body>
    <header class="topbar">
      <a href="index.html"><img src="ref\logo.png" alt="Logo header" /></a>
      <div class="brand">SMAA</div>
      <nav>
        <a href="index.html">Inicio</a><a href="login.html">Login</a
        ><a href="dashboard-viajero.html">Viajero</a
        ><a href="panel-funcionario.html">Funcionario</a
        ><a href="reportes.html">Reportes</a>
      </nav>
    </header>
    <main class="container">
      <div class="page-title-row">
        <h1>Declaración de viaje</h1>
        <a class="btn secondary dashboard-return-btn" href="dashboard-viajero.html">Volver al dashboard viajero</a>
      </div>
      <form class="form" onsubmit="crearDeclaracion(event)">
        <label
          >Nombre titular<input
            id="nombreTitular"
            required
            value="Esteban Gonzalez" /></label
        ><label
          >Documento titular<input
            id="documentoTitular"
            required
            value="12345678-9" /></label
        ><label>Fecha viaje<input id="fechaViaje" type="date" required /></label
        ><label
          >Paso fronterizo<input
            id="pasoFronterizo"
            required
            value="Los Libertadores" /></label
        ><label
          >Sentido<select id="sentidoCruce">
            <option>SALIDA</option>
            <option>INGRESO</option>
          </select></label
        ><label
          >Medio transporte<input
            id="medioTransporte"
            required
            value="Vehículo particular" /></label
        ><button class="btn">Crear declaración</button>
      </form>
    </main>
    <div id="successModal" class="modal" onclick="if(event.target===this) hideSuccessModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Declaración creada exitosamente</h3>
          <button class="modal-close" type="button" onclick="hideSuccessModal()">×</button>
        </div>
        <div class="modal-body">
          <p><strong>Tu folio es:</strong></p>
          <p id="successModalFolio" style="font-size: 1.2rem; color: var(--azul); font-weight: bold; word-break: break-all;"></p>
          <div id="contenedor-qr" style="margin-top: 15px; display: flex; justify-content: center;"></div>
          <p id="successModalMessage"></p>
          <div class="modal-actions">
            <button id="copyFolioButton" class="btn secondary" type="button" onclick="copyFolioFromSuccessModal()">Copiar folio</button>
            <button class="btn" type="button" onclick="hideSuccessModal()">Aceptar</button>
          </div>
        </div>
      </div>
    </div>


    <div id="errorModal" class="modal" onclick="if(event.target===this) hideErrorModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Error</h3>
          <button class="modal-close" type="button" onclick="hideErrorModal()">×</button>
        </div>
        <div class="modal-body">
          <p id="errorModalMessage"></p>
        </div>
      </div>
    </div>
    <script src="js/app.js?v=20260610-folio-copy-dashboard"></script>
  </body>
</html>
