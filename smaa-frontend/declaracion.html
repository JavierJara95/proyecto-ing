<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>SMAA - Declaración</title>
  </head>
  <body>
    <header class="topbar">
      <a href="index.html"><img src="ref\logo.png" alt="Logo header" /></a>
      <div class="brand">SMAA</div>
      <nav>
        <a href="index.html">Inicio</a>
        <a href="login.html">Login</a>
        <a href="dashboard-viajero.html">Viajero</a>
        <a href="panel-funcionario.html">Funcionario</a>
        <a href="reportes.html">Reportes</a>
      </nav>
    </header>

    <main class="container">
      <div class="page-title-row">
        <h1>Declaración de viaje</h1>
        <a class="btn secondary dashboard-return-btn" href="dashboard-viajero.html">
          Volver al portal de trámites
        </a>
      </div>

      <form class="form" onsubmit="crearDeclaracion(event)">
        <label>
          Nombre titular
          <input
            id="nombreTitular"
            required
            value="Esteban Gonzalez"
          />
        </label>

        <label>
          Documento titular
          <input
            id="documentoTitular"
            required
            value="12345678-9"
          />
        </label>

        <label>
          Fecha viaje
          <input
            id="fechaViaje"
            type="date"
            required
          />
        </label>

        <label>
          Paso fronterizo
          <select id="pasoFronterizo" required>
            <option value="">Seleccione un paso fronterizo</option>
            <option value="Los Libertadores">Los Libertadores</option>
            <option value="Pino Hachado">Pino Hachado</option>
            <option value="Cardenal Samoré">Cardenal Samoré</option>
            <option value="Jama">Jama</option>
            <option value="Chacalluta">Chacalluta</option>
            <option value="Colchane">Colchane</option>
            <option value="Huemules">Huemules</option>
            <option value="Dorotea">Dorotea</option>
            <option value="Monte Aymond">Monte Aymond</option>
            <option value="Integración Austral">Integración Austral</option>
          </select>
        </label>

        <label>
          Sentido
          <select id="sentidoCruce" required>
            <option value="SALIDA">SALIDA</option>
            <option value="INGRESO">INGRESO</option>
          </select>
        </label>

        <label>
          Medio transporte
          <select id="medioTransporte" required>
            <option value="">Seleccione una opción</option>
            <option value="Vehículo particular">Vehículo particular</option>
            <option value="Motocicleta">Motocicleta</option>
            <option value="Bus">Bus</option>
            <option value="Camión">Camión</option>
            <option value="Casa rodante">Casa rodante</option>
            <option value="Otro">Otro</option>
          </select>
        </label>

        <button class="btn">Crear declaración</button>
      </form>
    </main>

    <div
      id="successModal"
      class="modal"
      onclick="if(event.target===this) hideSuccessModal()"
    >
      <div class="modal-content">
        <div class="modal-header">
          <h3>Declaración creada exitosamente</h3>
          <button
            class="modal-close"
            type="button"
            onclick="hideSuccessModal()"
          >
            ×
          </button>
        </div>

        <div class="modal-body">
          <p><strong>Tu folio es:</strong></p>

          <p
            id="successModalFolio"
            style="
              font-size: 1.2rem;
              color: var(--azul);
              font-weight: bold;
              word-break: break-all;
            "
          ></p>

          <p id="successModalMessage"></p>

          <div class="modal-actions">
            <button
              id="copyFolioButton"
              class="btn secondary"
              type="button"
              onclick="copyFolioFromSuccessModal()"
            >
              Copiar folio
            </button>

            <button
              class="btn"
              type="button"
              onclick="hideSuccessModal()"
            >
              Aceptar
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      id="errorModal"
      class="modal"
      onclick="if(event.target===this) hideErrorModal()"
    >
      <div class="modal-content">
        <div class="modal-header">
          <h3>Error</h3>
          <button
            class="modal-close"
            type="button"
            onclick="hideErrorModal()"
          >
            ×
          </button>
        </div>

        <div class="modal-body">
          <p id="errorModalMessage"></p>
        </div>
      </div>
    </div>

    <script src="js/app.js?v=20260610-folio-copy-dashboard"></script>
  </body>
</html>
