<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>SMAA - Vehículo</title>
  </head>
  <body>
    <header class="topbar">
      <a href="index.html"><img src="ref\logo.png" alt="Logo header" /></a>
      <div class="brand">SMAA</div>
      <nav>
        <a href="index.html">Inicio</a><a href="login.html">Login</a
        ><a href="dashboard-viajero.html">Viajero</a
        ><a href="panel-funcionario.html">Funcionario</a
        ><a href="reportes.html">Reportes</a>
      </nav>
    </header>
    <main class="container">
      <h1>Registro de vehículo</h1>
      <form class="form" onsubmit="crearVehiculo(event)">
        <label
          >ID declaración<input
            id="declaracionId"
            type="number"
            required
            value="1" /></label
        ><label>Patente<input id="patente" required value="ABCD12" /></label
        ><label>Marca<input id="marca" required value="Toyota" /></label
        ><label>Modelo<input id="modelo" required value="Corolla" /></label
        ><label
          >Año<input id="anio" type="number" required value="2020" /></label
        ><label
          >Propietario<input
            id="propietario"
            required
            value="Esteban Gonzalez" /></label
        ><label
          >Conductor autorizado<input
            id="conductorAutorizado"
            required
            value="Esteban Gonzalez" /></label
        ><label
          >Fecha salida<input id="fechaSalida" type="date" required /></label
        ><label
          >Fecha retorno<input id="fechaRetorno" type="date" required /></label
        ><button class="btn">Registrar vehículo</button>
      </form>
    </main>
    <div id="successModal" class="modal" onclick="if(event.target===this) hideSuccessModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Vehículo registrado exitosamente</h3>
          <button class="modal-close" type="button" onclick="hideSuccessModal()">×</button>
        </div>
        <div class="modal-body">
          <p id="successModalMessage"></p>
          <button class="btn" onclick="hideSuccessModal()" style="width: 100%; margin-top: 15px;">Aceptar</button>
        </div>
      </div>
    </div>


    <div id="errorModal" class="modal" onclick="if(event.target===this) hideErrorModal()">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Error</h3>
          <button class="modal-close" type="button" onclick="hideErrorModal()">×</button>
        </div>
        <div class="modal-body">
          <p id="errorModalMessage"></p>
        </div>
      </div>
    </div>
    <script src="js/app.js?v=20260610-folio-wifi"></script>
  </body>
</html>
