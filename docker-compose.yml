version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: smaa_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build:
      context: ./smaa-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: smaa_db
      DB_USER: root
      DB_PASSWORD: root
      BACKEND_PORT: 8080
    depends_on:
      - db

  frontend:
    build:
      context: ./smaa-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
