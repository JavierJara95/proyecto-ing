version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: smaa-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: smaa_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - smaa-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: smaa-app:latest
    container_name: smaa-app
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: smaa_db
      DB_USER: root
      DB_PASSWORD: root
      BACKEND_PORT: 8080
      # Opcional: usa la IP del PC para que los QR funcionen al escanear desde celular.
      # Ejemplo en Windows PowerShell antes de levantar Docker:
      # $env:SMAA_PUBLIC_BASE_URL="http://192.168.1.25"
      SMAA_PUBLIC_BASE_URL: ${SMAA_PUBLIC_BASE_URL:-}
    ports:
      - "0.0.0.0:80:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smaa-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: smaa-phpmyadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
      PMA_PORT: 3306
    ports:
      - "0.0.0.0:8081:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smaa-network

volumes:
  db_data:

networks:
  smaa-network:
    driver: bridge
